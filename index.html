<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PORTAL X | Auto-Download</title>
    <style>
        body { 
            background: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
            display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;
        }
        .container { 
            text-align: center; padding: 40px; border: 1px solid #222; border-radius: 24px; 
            width: 90%; max-width: 400px; background: #0a0a0a;
        }
        .drop-zone { 
            border: 2px dashed #333; padding: 40px; border-radius: 16px; cursor: pointer; margin-bottom: 20px;
            transition: 0.3s;
        }
        .drop-zone:hover { border-color: #fff; }
        button { 
            background: #fff; color: #000; border: none; padding: 12px 24px; 
            border-radius: 12px; font-weight: 600; cursor: pointer; width: 100%;
        }
        #linkArea { margin-top: 20px; font-size: 14px; word-break: break-all; color: #888; }
        a { color: #fff; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Portal X</h2>
        <div class="drop-zone" onclick="document.getElementById('fileInput').click()">
            Drop file or Click to Select
            <input type="file" id="fileInput" style="display:none">
        </div>
        <button onclick="uploadFile()">Generate Download Link</button>
        <div id="linkArea"></div>
    </div>

    <script>
        async function uploadFile() {
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];
            if (!file) return alert("Select a file first");

            const linkArea = document.getElementById('linkArea');
            linkArea.innerHTML = "Processing to Cloud...";

            const formData = new FormData();
            formData.append("fileToUpload", file);
            formData.append("reqtype", "fileupload");

            try {
                const response = await fetch("https://catbox.moe/user/api.php", {
                    method: "POST",
                    body: formData
                });
                
                const url = await response.text();
                
                // We create a temporary download trigger so it acts like a direct file
                linkArea.innerHTML = `Success. <br><br> 
                <a href="${url}" download>CLICK HERE TO DOWNLOAD</a>
                <br><br><small>URL: ${url}</small>`;
            } catch (err) {
                linkArea.innerHTML = "Error syncing to nodes.";
            }
        }
    </script>
</body>
</html>
