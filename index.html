<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PORTAL X | Bridge</title>
    <style>
        body { background: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .panel { border: 1px solid #333; padding: 40px; border-radius: 20px; width: 350px; text-align: center; background: #0a0a0a; }
        .drop-zone { border: 1px dashed #444; padding: 30px; border-radius: 12px; cursor: pointer; margin-bottom: 20px; transition: 0.2s; }
        .drop-zone:hover { border-color: #fff; }
        button { background: #fff; color: #000; padding: 12px 20px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; }
        #result { margin-top: 20px; word-break: break-all; color: #aaa; font-size: 13px; }
        .copy-link { color: #fff; text-decoration: underline; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="panel">
    <h3>Portal X Bridge</h3>
    <div class="drop-zone" onclick="document.getElementById('fileIn').click()">
        Click to Select File
        <input type="file" id="fileIn" style="display:none">
    </div>
    <button onclick="bridgeUpload()">Generate Bridge Link</button>
    <div id="result"></div>
</div>

<script>
    async function bridgeUpload() {
        const file = document.getElementById('fileIn').files[0];
        const resDiv = document.getElementById('result');
        if (!file) return alert("Select a file");

        resDiv.innerText = "Bridging to Cloud Node...";

        const formData = new FormData();
        formData.append("reqtype", "fileupload");
        formData.append("fileToUpload", file);

        try {
            const response = await fetch("https://catbox.moe/user/api.php", {
                method: "POST",
                body: formData
            });
            const link = await response.text();
            
            resDiv.innerHTML = `Bridge Established:<br><br>
            <span class="copy-link" onclick="copyToClipboard('${link}')">${link}</span>
            <br><br><small>Click link to copy.</small>`;
        } catch (e) {
            resDiv.innerText = "Bridge failed. Connection timeout.";
        }
    }

    function copyToClipboard(text) {
        navigator.clipboard.writeText(text);
        alert("Link copied to clipboard!");
    }
</script>
</body>
</html>
