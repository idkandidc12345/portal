<!DOCTYPE html>
<html>
<head>
    <title>DropZone</title>
    <style>
        body { background: #000; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto; }
        .box { border: 1px solid #333; padding: 40px; border-radius: 20px; text-align: center; }
        input[type="file"] { margin: 20px 0; }
        button { background: #fff; color: #000; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h3>Upload File</h3>
        <input type="file" id="filePicker">
        <button onclick="upload()">Generate Direct Link</button>
        <p id="linkArea"></p>
    </div>

    <script>
        async function upload() {
            const file = document.getElementById('filePicker').files[0];
            // You would connect your R2/S3 API key here
            // Once uploaded, you generate the public URL:
            const myDomain = "https://files.yourdomain.com/";
            const fileName = file.name;
            const finalLink = myDomain + fileName;
            
            document.getElementById('linkArea').innerHTML = `Copy: <a href="${finalLink}" download>${finalLink}</a>`;
        }
    </script>
</body>
</html>
